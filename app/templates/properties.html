{% extends "base.html" %}

{% block main %}
<h1 class="mt-4 mb-4">Properties</h1>

<div class="row g-4">
  {% for property in properties %}
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img src="{{ url_for('static', filename='uploads/' + property.photo) }}" class="card-img-top" alt="{{ property.title }}" style="height: 220px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ property.title }}</h5>
          <p class="text-muted mb-2">{{ property.location }}</p>
          <p class="fw-bold text-primary mb-3">{{ property.currency }} ${{ "{:,.2f}".format(property.price) }}</p>
          <a href="{{ url_for('property_detail', propertyid=property.id) }}" class="btn btn-primary mt-auto">View Property</a>
        </div>
      </div>
    </div>
  {% else %}
    <p>No properties have been added yet.</p>
  {% endfor %}
</div>
{% endblock %}
